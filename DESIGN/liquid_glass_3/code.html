<style>
        .liquid-glass {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border-top: 1.5px solid rgba(255, 255, 255, 0.5);
            border-left: 1.5px solid rgba(255, 255, 255, 0.5);
            border-bottom: 1.5px solid rgba(255, 255, 255, 0.1);
            border-right: 1.5px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(255, 255, 255, 0.15);
        }
        
        .liquid-glass-intense {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-top: 1.5px solid rgba(255, 255, 255, 0.6);
            border-left: 1.5px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 12px 40px 0 rgba(255, 255, 255, 0.2);
        }

        .bg-mesh {
            background-image:

                radial-gradient(at 100% 0%, rgba(255, 219, 204, 0.5) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(255, 248, 245, 1) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(255, 182, 147, 0.3) 0px, transparent 50%);
        }

            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.4), 0 0 20px rgba(255, 107, 0, 0.3);

<!-- TopAppBar -->

<div class="flex items-center gap-2 text-[#FF6B00]">
<span class="material-symbols-outlined text-2xl">bubble_chart</span>
<span class="text-2xl font-black tracking-tighter">Predicta</span>
</div>
<div>
<span class="material-symbols-outlined text-3xl text-on-surface-variant">account_circle</span>
</div>

<p class="font-body-lg text-body-lg text-on-surface-variant max-w-md">Experience the future of financial intelligence. Advanced forecasting wrapped in serene, liquid glass precision.</p>
</div>
<div class="flex flex-col sm:flex-row gap-stack-md">
<button class="bg-primary-container text-white font-label-bold text-label-bold py-4 px-8 rounded-full glowing-btn hover:scale-105 transition-transform duration-300">
                        Get Started
                    </button>
<button class="liquid-glass-intense text-on-surface font-label-bold text-label-bold py-4 px-8 rounded-full hover:bg-white/60 transition-colors duration-300">
                        Login
                    </button>
</div>
</div>
<!-- Hero Image Bento -->
<div class="liquid-glass rounded-xl overflow-hidden relative min-h-[300px]">
<img class="w-full h-full object-cover absolute inset-0 mix-blend-multiply opacity-80" data-alt="A striking abstract digital sculpture representing liquid glass. The form is highly organic yet mathematically precise, resembling fluid frozen in time. The material is completely translucent, heavily refracting the soft white and subtle orange ambient lighting of the environment. The background is a clean, pearl-white void that emphasizes the premium, technical zen aesthetic of the object. Extreme clarity, high-end 3D render style." src="https://lh3.googleusercontent.com/aida/ADBb0uhr-IOFWasei4VzD6VgHYwHpsHCkXi-LayU1CXhYoue8D8enVjdxgZFQw1XwID8Fc6X2ZBIJ1LhfPYK4LwxO3A7VALKiCROK2UkfbUi8isAqSE0v6xIgp2aAAcUiXOSTS3Uy0flb54RStpKntNgpDPLir1FJlZEy62fR3WZQNX9oCoe1qRTIjcHMaa4yGWwuya5cYHUKjlMeA1kGgEQhh0MO8RJsjCFIzQaSsoL45oL0EgJmHsrmSwT44iW0YjTY3bhsrMS209DWw"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface-container-low/50 to-transparent"></div>
</div>

</div>
<div class="h-48 w-full relative overflow-hidden rounded-lg bg-surface/50 border border-white/30 flex items-end">

<div class="w-full h-full absolute inset-0 flex items-end justify-between px-4 pb-4">
<div class="w-1/6 bg-primary-container/20 h-1/4 rounded-t-sm backdrop-blur-sm relative"></div>
<div class="w-1/6 bg-primary-container/40 h-2/4 rounded-t-sm backdrop-blur-sm relative"></div>
<div class="w-1/6 bg-primary-container/60 h-1/3 rounded-t-sm backdrop-blur-sm relative"></div>
<div class="w-1/6 bg-primary-container/80 h-3/4 rounded-t-sm backdrop-blur-sm relative shadow-[0_0_15px_rgba(255,107,0,0.4)]"></div>
