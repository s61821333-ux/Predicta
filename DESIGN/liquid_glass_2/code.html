<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .liquid-glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            box-shadow: 0 8px 32px 0 rgba(255, 255, 255, 0.5), 0 20px 40px 0 rgba(0, 0, 0, 0.05);
            border-top: 1.5px solid rgba(255, 255, 255, 0.8);
            border-left: 1.5px solid rgba(255, 255, 255, 0.8);
            border-right: 1.5px solid rgba(255, 255, 255, 0.2);
            border-bottom: 1.5px solid rgba(255, 255, 255, 0.2);
        }

        .liquid-recessed {
            background: rgba(225, 216, 212, 0.2); /* surface-dim based */
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.03), 0 1px 0 rgba(255,255,255,0.7);
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        .bg-mesh {
            background-color: #fff8f5;
            background-image: 
                radial-gradient(at 10% 20%, rgba(255, 219, 204, 0.4) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(255, 107, 0, 0.05) 0px, transparent 50%),
                radial-gradient(at 50% 50%, rgba(255, 255, 255, 0.8) 0px, transparent 100%);
        }
        
        /* Frame Motion Simulation */
        body {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-mesh min-h-screen text-on-background font-body-md relative overflow-x-hidden flex flex-col items-center justify-center p-margin-page">
<!-- Ambient Background Element -->
<div class="fixed top-0 left-0 w-[230px] h-screen opacity-10 pointer-events-none mix-blend-multiply" data-alt="A tall, abstract digital canvas featuring soft, flowing gradients of warm orange and pearlescent white, suggesting a liquid light texture. The forms are fluid and continuous, blending seamlessly into a modern light-mode aesthetic, creating a serene, high-tech backdrop." style="background-image: url('https://lh3.googleusercontent.com/aida/ADBb0uhr-IOFWasei4VzD6VgHYwHpsHCkXi-LayU1CXhYoue8D8enVjdxgZFQw1XwID8Fc6X2ZBIJ1LhfPYK4LwxO3A7VALKiCROK2UkfbUi8isAqSE0v6xIgp2aAAcUiXOSTS3Uy0flb54RStpKntNgpDPLir1FJlZEy62fR3WZQNX9oCoe1qRTIjcHMaa4yGWwuya5cYHUKjlMeA1kGgEQhh0MO8RJsjCFIzQaSsoL45oL0EgJmHsrmSwT44iW0YjTY3bhsrMS209DWw'); background-size: cover; background-position: center;">
</div>
<!-- Task Header (Suppressing Global Nav) -->
<header class="w-full max-w-md flex justify-between items-center mb-stack-lg z-10 relative">
<button class="w-12 h-12 flex items-center justify-center rounded-full liquid-glass-card hover:bg-white/60 transition-all active:scale-95 text-on-surface">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-on-background text-center flex-1">New Entry</h1>
<div class="w-12 h-12"></div> <!-- Spacer for centering -->
</header>
<!-- Main Form Card -->
<main class="w-full max-w-md liquid-glass-card rounded-xl p-padding-card flex flex-col gap-stack-md z-10 relative">
<!-- Recessed Amount Field -->
<div class="flex flex-col items-center justify-center py-stack-md">
<p class="font-label-bold text-label-bold text-outline mb-2">AMOUNT</p>
<div class="w-full liquid-recessed rounded-lg py-4 px-6 flex items-center justify-center gap-2">
<span class="font-headline-lg text-headline-lg text-primary-container/60">$</span>
<input class="bg-transparent border-none p-0 text-center font-display-xl text-display-xl text-primary-container focus:ring-0 w-3/4 outline-none placeholder-primary-container/30" placeholder="0.00" type="text" value="0.00"/>
</div>
</div>
<div class="grid grid-cols-2 gap-gutter-bento">
<!-- Category Field -->
<div class="liquid-recessed rounded-lg p-4 flex flex-col gap-2 relative group cursor-pointer hover:bg-white/30 transition-all active:scale-[0.98]">
<p class="font-label-light text-label-light text-outline">Category</p>
<div class="flex items-center justify-between">
<span class="font-body-lg text-body-lg text-on-surface">Dining</span>
<span class="material-symbols-outlined text-outline">restaurant</span>
</div>
</div>
<!-- Date Field -->
<div class="liquid-recessed rounded-lg p-4 flex flex-col gap-2 relative group cursor-pointer hover:bg-white/30 transition-all active:scale-[0.98]">
<p class="font-label-light text-label-light text-outline">Date</p>
<div class="flex items-center justify-between">
<span class="font-body-lg text-body-lg text-on-surface">Today</span>
<span class="material-symbols-outlined text-outline">calendar_today</span>
</div>
</div>
</div>
<!-- Note Field -->
<div class="liquid-recessed rounded-lg p-4 flex flex-col gap-2">
<p class="font-label-light text-label-light text-outline">Note (Optional)</p>
<input class="bg-transparent border-none p-0 font-body-md text-body-md text-on-surface focus:ring-0 w-full outline-none placeholder-outline/50" placeholder="What was this for?" type="text"/>
</div>
<!-- Scan Receipt Button -->
<button class="w-full mt-stack-sm flex items-center justify-center gap-3 p-4 rounded-DEFAULT border-[1.5px] border-primary-container/30 bg-white/20 backdrop-blur-md hover:bg-white/40 active:scale-95 transition-all group">
<span class="material-symbols-outlined text-[24px] text-primary-container group-hover:scale-110 transition-transform">document_scanner</span>
<span class="font-label-bold text-label-bold text-primary-container">SCAN RECEIPT</span>
</button>
</main>
<!-- Primary Action Button -->
<div class="w-full max-w-md mt-stack-lg z-10 relative">
<button class="w-full bg-primary-container text-on-primary font-label-bold text-label-bold py-5 rounded-full shadow-[0_0_30px_rgba(255,107,0,0.4)] relative overflow-hidden active:scale-95 transition-all flex justify-center items-center gap-2 group">
<div class="absolute inset-0 bg-gradient-to-b from-white/20 to-transparent pointer-events-none"></div>
<span>SAVE TRANSACTION</span>
<span class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform">check_circle</span>
</button>
</div>
</body></html>
